name: ReleaseCandidateNotifications

on:
  release:
    types: [published] # Triggers for both "Prereleases" and standard releases

permissions: {}

jobs:
  notify:
    name: 'Send RC Notifications'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: 'Checkout Repository'
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: 'main'
      - name: 'Find Issues and Create Comments'
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/rc-notify.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});
