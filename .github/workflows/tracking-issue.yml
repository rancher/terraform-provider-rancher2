name: TrackingIssue
# This workflow generates a "tracking" issue when a PR is found targeting main and isn't already tracked.
on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: {} # Allows manual triggering

env :
  TERRAFORM_MAINTAINERS: ${{ vars.TERRAFORM_MAINTAINERS }} # eg. ["matttrach"]

permissions: {}

jobs:
  generate-issue:
    name: 'Create Tracking Issue'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write # To create issues
      pull-requests: write # To add labels to PRs
      contents: read # To checkout the repo and get branch names
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout
        with:
          fetch-depth: 0
          ref: 'main'
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0 https://github.com/actions/github-script
        env:
          TERRAFORM_MAINTAINERS: ${{ env.TERRAFORM_MAINTAINERS }}
        with:
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/tracking-issue.js`;
            const { default: script } = await import(scriptPath);
            await script({github, core, process});
