name: FOSSA Scanning

on:
  push:
    branches: ["main", "release/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  fossa-scanning:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The FOSSA token is shared between all repos in Rancher's GH org. It can be
      # used directly and there is no need to request specific access to EIO.
      - name: Read FOSSA token
        # https://github.com/rancher-eio/read-vault-secrets/commits
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # main
        with:
          secrets: |
            secret/data/github/org/rancher/fossa/push token | FOSSA_API_KEY_PUSH_ONLY

      - name: FOSSA scan
        # https://github.com/fossas/fossa-action/releases
        uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3 # v1.9.0
        with:
          api-key: ${{ env.FOSSA_API_KEY_PUSH_ONLY }}
          # Only run the scan and don't provide/return any results back to the pipeline.
          run-tests: false
