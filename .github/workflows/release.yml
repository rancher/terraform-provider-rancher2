name: release
on:
  push:
    branches:
      - release/v*

env:
  AWS_REGION: us-west-2
  AWS_ROLE: arn:aws:iam::270074865685:role/terraform-module-ci-test
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  ALL_TESTS_JSON: '["TestOneBasic","TestThreeBasic","TestProductionBasic"]'
  NIX_INSTALL_SHA: de490f61fcbaf9a5cabf2fa621ddb9ef93ad35d9a23a04e7d51b26e092b63691
  NIX_INSTALL_VERSION: 2.34.4

permissions: {}

jobs:
  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    outputs:
      tests: ${{ steps.set-matrix.outputs.tests }}
    steps:
      - name: Set Matrix Output
        id: set-matrix
        run: |
          JSON_LIST="$ALL_TESTS_JSON"
          echo "tests=$JSON_LIST" >> "$GITHUB_OUTPUT"

  release-please-release:
    name: Release Please (Release Only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.release-please-release.outputs.version }}
      release_created: ${{ steps.release-please-release.outputs.release_created }}
    steps:
      - name: Release Please (Release Only)
        # https://github.com/googleapis/release-please-action/releases
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please-release
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  release-please-pr:
    name: Release Please (PR Only)
    needs:
      - release-please-release
      - release
    if: |
      !cancelled() &&
      needs.release-please-release.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      prs_created: ${{ steps.release-please-pr.outputs.prs_created }}
      pr: ${{ steps.release-please-pr.outputs.pr }}
    steps:
      - name: Release Please (PR Only)
        # https://github.com/googleapis/release-please-action/releases
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please-pr
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  wait-for-e2e:
    name: Wait for E2E Tests
    needs:
      - release-please-pr
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # These run only if a release PR was opened or modified, so not when the PR is merged
        # https://github.com/actions/github-script/releases
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        name: wait-for-e2e
        if: needs.release-please-pr.outputs.prs_created == 'true'
        env:
          PR_NUMBER: ${{ fromJSON(needs.release-please-pr.outputs.pr).number }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/wait-for-e2e.js`;
            const { default: script } = await import(scriptPath);
            await script({ github, context, core, process });

  # this creates a loop using workflow logic,
  #   each iteration of the loop is in its own job
  #   this is important because we want each iteration to be a separate VM
  #   we are trying to get a clean filesystem and different IP for each test
  #   each loop starts sequentially, but runs at the same time
  # for each test we make three attempts to get a fresh IP
  #   the first time a test gets a new IP it will create a lock artifact
  #   the remaining attempts will effectively cancel themselves when they detect that lock
  test:
    name: Run E2E Tests
    needs:
      - setup
      - release-please-pr
    if: needs.release-please-pr.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      id-token: write
    strategy:
      matrix:
        attempts: [1, 2, 3] # I want to have jobs specifically in place to retry or cancel a test based on IP collisions
        test_name: ${{ fromJSON(needs.setup.outputs.tests) }}
    steps:
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: 'Clear out GitHub Runner'
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // requires checkout before step
            // each job runs in its own ephemeral VM, so each job needs its own clear out step
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/clear-runner.js`;
            const { default: script } = await import(scriptPath);
            await script({ core });
      - name: Get IP
        id: get-ip
        run: |
          IP=$(curl -s https://ipinfo.io/ip)
          if ! [[ "$IP" =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "Error: Invalid IP address format: $IP" >&2
            exit 1
          fi
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
      - name: Broadcast IP Artifact
        # https://github.com/actions/upload-artifact/releases
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ip-${{ steps.get-ip.outputs.ip }}-${{ strategy.job-index }}
          path: /dev/null
          retention-days: 1
      - name: Stagger Job Start (Jitter)
        env:
          JOB_INDEX: ${{ strategy.job-index }}
        run: |
          DELAY=$(( JOB_INDEX * 45 ))
          echo "Sleeping for $DELAY seconds to prevent race conditions..."
          sleep "$DELAY"
      - name: Check for Lock
        id: check-lock
        if: strategy.job-index != 0 # the first job doesn't need to check
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TEST_NAME: ${{ matrix.test_name }}
          INDEX: ${{ strategy.job-index }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/check-lock.js`;
            const { default: script } = await import(scriptPath);
            await script({ process, github, core });
      - name: Check for IP Collision
        id: check-ip
        if: steps.check-lock.outputs.status == 'clean' && strategy.job-index != 0 # the first job doesn't need to check
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          IP: ${{ steps.get-ip.outputs.ip }}
          INDEX: ${{ strategy.job-index }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/check-ip.js`;
            const { default: script } = await import(scriptPath);
            await script({ process, github, core });
      - name: Determine if Test Should Proceed
        id: proceed
        env:
          JOB_INDEX: ${{ strategy.job-index }}
          STATUS_LOCK: ${{ steps.check-lock.outputs.status }}
          STATUS_IP: ${{ steps.check-ip.outputs.status }}
          IP_ADDR: ${{ steps.get-ip.outputs.ip }}
        run: |
          RUN="false"
          if [[ "$JOB_INDEX" == "0" ]]; then
            RUN="true"
          elif [[ "$STATUS_LOCK" == "clean" && "$STATUS_IP" == "clean" ]]; then
            RUN="true"
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          if [[ "$RUN" == "false" ]]; then
            echo "Skipping test execution. Another attempt claimed the lock or IP collision detected."
          else
            echo "Proceeding with test execution on IP: $IP_ADDR"
          fi
      - name: Create Lock Artifact
        if: steps.proceed.outputs.run == 'true'
        # https://github.com/actions/upload-artifact/releases
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lock-${{ matrix.test_name }}-${{ strategy.job-index }}
          path: /dev/null
          retention-days: 1
      - name: Install Nix
        if: steps.proceed.outputs.run == 'true'
        run: |
          curl -L -o nix_install.sh "https://releases.nixos.org/nix/nix-${NIX_INSTALL_VERSION}/install"
          echo "${NIX_INSTALL_SHA} nix_install.sh" | sha256sum -c -
          chmod +x nix_install.sh
          ./nix_install.sh
          source /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix --version
          rm -f ./nix_install.sh
      - name: Run Unit Tests
        id: run-unit-tests
        if: steps.proceed.outputs.run == 'true'
        shell: /home/runner/.nix-profile/bin/nix develop --ignore-environment --extra-experimental-features nix-command --extra-experimental-features flakes --keep HOME --keep NIX_SSL_CERT_FILE --keep NIX_ENV_LOADED --keep TERM --command bash -e {0}
        run: make test
      - id: aws-creds
        name: Configure AWS Credentials
        if: steps.proceed.outputs.run == 'true'
        # https://github.com/aws-actions/configure-aws-credentials/releases
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{env.AWS_ROLE}}
          role-session-name: ${{github.run_id}}
          aws-region: ${{env.AWS_REGION}}
          role-duration-seconds: 21600 # 6 hours is the maximum GitHub execution time
          output-credentials: true
      - name: Run E2E Tests
        if: steps.proceed.outputs.run == 'true'
        shell: '/home/runner/.nix-profile/bin/nix develop --ignore-environment --extra-experimental-features nix-command --extra-experimental-features flakes --keep HOME --keep SSH_AUTH_SOCK --keep IDENTIFIER --keep GITHUB_TOKEN --keep GITHUB_OWNER --keep ZONE --keep AWS_ROLE --keep AWS_REGION --keep AWS_DEFAULT_REGION --keep AWS_ACCESS_KEY_ID --keep AWS_SECRET_ACCESS_KEY --keep AWS_SESSION_TOKEN --keep UPDATECLI_GPGTOKEN --keep UPDATECLI_GITHUB_TOKEN --keep UPDATECLI_GITHUB_ACTOR --keep GPG_SIGNING_KEY --keep NIX_SSL_CERT_FILE --keep NIX_ENV_LOADED --keep TERM --command bash -e {0}'
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GITHUB_OWNER: ${{github.repository_owner}}
          IDENTIFIER: ${{github.run_id}}
          ZONE: ${{secrets.ZONE}}
          TEST_NAME: ${{ matrix.test_name }}
        run: |
          export AWS_MAX_ATTEMPTS="100"
          export AWS_RETRY_MODE="adaptive"
          export ACME_SERVER_URL="https://acme-v02.api.letsencrypt.org/directory"
          export RANCHER_INSECURE="false"
          ./run_tests.sh -t "$TEST_NAME" -d
  audit:
    name: Audit E2E Test Runs
    needs:
      - setup
      - release-please-pr
      - test
    if: always() && needs.release-please-pr.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          fetch-depth: 0
      - name: Check for Tests Run
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ALL_TESTS_JSON: '${{ env.ALL_TESTS_JSON }}'
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            // requires checkout before step
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/check-run.js`;
            const { default: script } = await import(scriptPath);
            await script({ process, github, core });
  cleanup:
    name: Cleanup AWS Resources
    needs:
      - release-please-pr
      - test
      - audit
    if: always() && needs.release-please-pr.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          fetch-depth: 0
      - name: 'Clear out GitHub Runner'
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // requires checkout before step
            // each job runs in its own ephemeral VM, so each job needs its own clear out step
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/clear-runner.js`;
            const { default: script } = await import(scriptPath);
            await script({ core });
      - name: Configure AWS Credentials
        id: aws-creds
        # https://github.com/aws-actions/configure-aws-credentials/releases
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{env.AWS_ROLE}}
          role-session-name: ${{github.run_id}}-cleanup
          aws-region: ${{env.AWS_REGION}}
          role-duration-seconds: 3600 # 1 hour
          output-credentials: true
      - name: install-nix
        run: |
          curl -L -o nix_install.sh "https://releases.nixos.org/nix/nix-${NIX_INSTALL_VERSION}/install"
          echo "${NIX_INSTALL_SHA} nix_install.sh" | sha256sum -c -
          chmod +x nix_install.sh
          ./nix_install.sh
          source /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix --version
          rm -f ./nix_install.sh
      - name: cleanup
        shell: '/home/runner/.nix-profile/bin/nix develop --ignore-environment --extra-experimental-features nix-command --extra-experimental-features flakes --keep HOME --keep SSH_AUTH_SOCK --keep IDENTIFIER --keep GITHUB_TOKEN --keep GITHUB_OWNER --keep ZONE --keep AWS_ROLE --keep AWS_REGION --keep AWS_DEFAULT_REGION --keep AWS_ACCESS_KEY_ID --keep AWS_SECRET_ACCESS_KEY --keep AWS_SESSION_TOKEN --keep UPDATECLI_GPGTOKEN --keep UPDATECLI_GITHUB_TOKEN --keep UPDATECLI_GITHUB_ACTOR --keep GPG_SIGNING_KEY --keep NIX_SSL_CERT_FILE --keep NIX_ENV_LOADED --keep TERM --command bash -e {0}'
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          IDENTIFIER: ${{github.run_id}}
        run: |
          export AWS_MAX_ATTEMPTS="100"
          export AWS_RETRY_MODE="adaptive"
          ./run_tests.sh -c "$IDENTIFIER"
  report:
    name: Report E2E Results
    needs:
      - setup
      - release-please-pr
      - test
      - audit
      - cleanup
    if: always() && needs.release-please-pr.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Comment Success on PR
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: needs.test.result == 'success' && needs.audit.result == 'success'
        env:
          PR_NUMBER: ${{ fromJSON(needs.release-please-pr.outputs.pr).number }}
          TEST_STATUS: "success"
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/report-e2e-status.js`;
            const { default: script } = await import(scriptPath);
            await script({ github, context, core, process });
      - name: Comment Failure on PR
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: needs.test.result == 'failure' || needs.audit.result == 'failure'
        env:
          PR_NUMBER: ${{ fromJSON(needs.release-please-pr.outputs.pr).number }}
          TEST_STATUS: "failure"
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/report-e2e-status.js`;
            const { default: script } = await import(scriptPath);
            await script({ github, context, core, process });
  rc-release:
    name: Generate RC Release
    needs:
      - setup
      - release-please-pr
      - test
      - audit
      - cleanup
      - report
    if: always() && needs.release-please-pr.outputs.prs_created == 'true' && (needs.test.result == 'success' && needs.audit.result == 'success')
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      # If the e2e tests pass we automatically generate an RC release
      #   this shouldn't happen when the release PR is merged, only when it's opened or updated
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: 'Clear out GitHub Runner'
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // requires checkout before step
            // each job runs in its own ephemeral VM, so each job needs its own clear out step
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/clear-runner.js`;
            const { default: script } = await import(scriptPath);
            await script({ core });
      - name: Create and Push RC Tag with Git
        id: create-push-rc-tag
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x .github/workflows/scripts/create-rc-tag.sh
          ./.github/workflows/scripts/create-rc-tag.sh
      - name: retrieve GPG Credentials
        id: retrieve-gpg-credentials
        # https://github.com/rancher-eio/read-vault-secrets/commits
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/signing/gpg passphrase | GPG_PASSPHRASE ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKeyId | GPG_KEY_ID ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKey | GPG_KEY
      - name: import_gpg_key
        id: import-gpg-key
        env:
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_KEY: ${{ env.GPG_KEY }}
        run: |
          cleanup() {
            # clear history just in case
            history -c
          }
          trap cleanup EXIT TERM

          # sanitize variables
          if [ -z "${GPG_PASSPHRASE}" ]; then echo "gpg passphrase empty"; exit 1; fi
          if [ -z "${GPG_KEY_ID}" ]; then echo "key id empty"; exit 1; fi
          if [ -z "${GPG_KEY}" ]; then echo "key contents empty"; exit 1; fi

          echo "Importing gpg key"
          echo "${GPG_KEY}" | gpg --import --batch > /dev/null || { echo "Failed to import GPG key"; exit 1; }
      - name: install-nix
        run: |
          curl -L -o nix_install.sh "https://releases.nixos.org/nix/nix-${NIX_INSTALL_VERSION}/install"
          echo "${NIX_INSTALL_SHA} nix_install.sh" | sha256sum -c -
          chmod +x nix_install.sh
          ./nix_install.sh
          source /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix --version
          rm -f ./nix_install.sh
      - name: Run GoReleaser
        shell: /home/runner/.nix-profile/bin/nix develop --ignore-environment --extra-experimental-features nix-command --extra-experimental-features flakes --keep HOME --keep SSH_AUTH_SOCK --keep GPG_KEY_ID --keep GPG_PASSPHRASE --keep GITHUB_TOKEN --keep NIX_SSL_CERT_FILE --keep NIX_ENV_LOADED --keep TERM --command bash -e {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
        run: |-
          goreleaser release --clean --config .goreleaser_rc.yml
      - name: 'Find Issues and Create Comments'
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAG: ${{ env.RC_TAG }}
          BRANCH: ${{ env.RC_BRANCH }}
        with:
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/rc-notify.js`;
            const { default: script } = await import(scriptPath);
            await script({github, context, core, process});

  # This runs after release-please generates a release, so when the release PR is merged
  release:
    name: Generate Full Release
    needs:
      - release-please-release
    if: always() && needs.release-please-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: 'Clear out GitHub Runner'
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // requires checkout before step
            // each job runs in its own ephemeral VM, so each job needs its own clear out step
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/clear-runner.js`;
            const { default: script } = await import(scriptPath);
            await script({ core });
      - name: retrieve GPG Credentials
        # https://github.com/rancher-eio/read-vault-secrets/commits
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/signing/gpg passphrase | GPG_PASSPHRASE ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKeyId | GPG_KEY_ID ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKey | GPG_KEY
      - name: import_gpg_key
        env:
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_KEY: ${{ env.GPG_KEY }}
        run: |
          cleanup() {
            # clear history just in case
            history -c
          }
          trap cleanup EXIT TERM

          # sanitize variables
          if [ -z "${GPG_PASSPHRASE}" ]; then echo "gpg passphrase empty"; exit 1; fi
          if [ -z "${GPG_KEY_ID}" ]; then echo "key id empty"; exit 1; fi
          if [ -z "${GPG_KEY}" ]; then echo "key contents empty"; exit 1; fi

          echo "Importing gpg key"
          echo "${GPG_KEY}" | gpg --import --batch > /dev/null || { echo "Failed to import GPG key"; exit 1; }
      - name: install-nix
        run: |
          curl -L -o nix_install.sh "https://releases.nixos.org/nix/nix-${NIX_INSTALL_VERSION}/install"
          echo "${NIX_INSTALL_SHA} nix_install.sh" | sha256sum -c -
          chmod +x nix_install.sh
          ./nix_install.sh
          source /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix --version
          rm -f ./nix_install.sh
      - name: Run GoReleaser
        shell: /home/runner/.nix-profile/bin/nix develop --ignore-environment --extra-experimental-features nix-command --extra-experimental-features flakes --keep HOME --keep SSH_AUTH_SOCK --keep GPG_KEY_ID --keep GPG_PASSPHRASE --keep GITHUB_TOKEN --keep NIX_SSL_CERT_FILE --keep NIX_ENV_LOADED --keep TERM --command bash -e {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
        run: |-
          goreleaser release --clean --config .goreleaser.yml
      - name: Publish Release
        # https://github.com/actions/github-script/releases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ needs.release-please-release.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/publish-release.js`;
            const { default: script } = await import(scriptPath);
            await script({ github, context, core, process });
