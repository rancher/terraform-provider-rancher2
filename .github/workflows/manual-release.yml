name: Manually Create Full Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to create, make sure to select the correct branch.'
        required: true
      sha:
        description: 'The commit SHA to create the tag from, defaults to HEAD of the selected branch.'
        required: false

env:
  NIX_INSTALL_SHA: de490f61fcbaf9a5cabf2fa621ddb9ef93ad35d9a23a04e7d51b26e092b63691
  NIX_INSTALL_VERSION: 2.34.4

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
        # https://github.com/actions/checkout/releases
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
        # https://github.com/actions/github-script/releases
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: check-user-in-maintainers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAINTAINERS: ${{ vars.TERRAFORM_MAINTAINERS }}
        with:
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/check-maintainer.js`;
            const { default: script } = await import(scriptPath);
            const isMaintainer = await script({context, core, process});
            if (!isMaintainer) {
              core.setFailed(`User ${context.actor} is not authorized to trigger this workflow.`);
            }
      - env:
          TAG: ${{ inputs.tag }}
        run: |
          # if the tag contains "rc" we should not be in this workflow
          if grep -q "rc" <<< "$TAG"; then
            echo "Tag contains 'rc', please use the manual-rc-release workflow"
            exit 1
          fi
      - name: Create and Push Tag with Git
        id: create-push-tag
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          TAG: ${{ inputs.tag }}
          SHA: ${{ inputs.sha }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          if [ -n "$SHA" ]; then
            git tag "$TAG" -m "Release $TAG" "$SHA"
          else
            git tag "$TAG" -m "Release $TAG"
          fi
          git push origin "$TAG"
      - name: Check out new tag into a new directory
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          path: ${{ github.workspace }}/tags/${{ inputs.tag }}
      - env:
          WORKSPACE: ${{ github.workspace }}
          TAG: ${{ inputs.tag }}
        run: |
          # remove any tags that are not the one specified (to avoid goreleaser confusion)
          DIR="$(pwd)"
          cd "$WORKSPACE/tags/$TAG"
          tags_to_delete=$(git tag | grep -v -e "^$TAG$")
          if [ -n "$tags_to_delete" ]; then
            echo "$tags_to_delete" | xargs git tag -d
          fi
          # check for terraform-registry-manifest.json presence and create if missing
          if [ ! -f "terraform-registry-manifest.json" ]; then
            echo "terraform-registry-manifest.json not found, creating a default one."
            cat <<EOF > terraform-registry-manifest.json
          {
              "version": 1,
              "metadata": {
                  "protocol_versions": ["4.0", "5.0", "6.0"]
              }
          }
          EOF
          fi
          cd "$DIR"
      - name: retrieve GPG Credentials
        id: retrieve-gpg-credentials
        # https://github.com/rancher-eio/read-vault-secrets/commits
        uses: rancher-eio/read-vault-secrets@7282bf97898cd1c16c89f837e0bb442e6d384c89 # main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/signing/gpg passphrase | GPG_PASSPHRASE ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKeyId | GPG_KEY_ID ;
            secret/data/github/repo/${{ github.repository }}/signing/gpg privateKey | GPG_KEY
      - name: import_gpg_key
        id: import-gpg-key
        env:
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_KEY: ${{ env.GPG_KEY }}
        run: |
          cleanup() {
            # clear history just in case
            history -c
          }
          trap cleanup EXIT TERM

          # sanitize variables
          if [ -z "${GPG_PASSPHRASE}" ]; then echo "gpg passphrase empty"; exit 1; fi
          if [ -z "${GPG_KEY_ID}" ]; then echo "key id empty"; exit 1; fi
          if [ -z "${GPG_KEY}" ]; then echo "key contents empty"; exit 1; fi

          echo "Importing gpg key"
          echo "${GPG_KEY}" | gpg --import --batch > /dev/null || { echo "Failed to import GPG key"; exit 1; }
      - name: install-nix
        run: |
          curl -L -o nix_install.sh "https://releases.nixos.org/nix/nix-${NIX_INSTALL_VERSION}/install"
          echo "${NIX_INSTALL_SHA} nix_install.sh" | sha256sum -c -
          chmod +x nix_install.sh
          ./nix_install.sh
          source /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix --version
          rm -f ./nix_install.sh
      - name: Run GoReleaser
        shell: /home/runner/.nix-profile/bin/nix develop --ignore-environment --extra-experimental-features nix-command --extra-experimental-features flakes --keep HOME --keep SSH_AUTH_SOCK --keep TAG --keep GPG_KEY_ID --keep GPG_PASSPHRASE --keep GITHUB_TOKEN --keep NIX_SSL_CERT_FILE --keep NIX_ENV_LOADED --keep TERM --command bash -e {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          TAG: ${{ inputs.tag }}
        run: |-
          cd "$GITHUB_WORKSPACE/tags/$TAG"
          goreleaser release --clean --skip=validate --config ../../.goreleaser.yml
